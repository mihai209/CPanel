# CPanel Rocky - Standalone serving template
# Use this when you do NOT place the panel behind nginx/apache.
# This file is custom to Rocky deployments and can be parsed by your tooling.

[standalone]
# Public URL used by panel links/OAuth callbacks.
app_url = https://panel.example.com

# Node process bind settings.
listen_host = 0.0.0.0
listen_port = 3000

# If running behind any proxy/LB, set to true and ensure headers are trusted.
trust_proxy = false

# WebSocket routes are built-in and enabled by default:
#   /ws/connector
#   /ws/ui
#   /ws/server/:containerId
websocket_enabled = true

# HTTP body limit hint for upstream tooling (app currently handles large uploads via proxy/runtime settings).
max_body_size_mb = 512

[tls]
# Standalone TLS options (if your runtime wrapper supports direct TLS termination).
enabled = false
certificate_file =
private_key_file =

[process]
# Suggested runtime command.
command = node server.js
working_directory = /opt/cpanel/panel
environment_file = /opt/cpanel/panel/.env

[firewall]
# Open port if standalone public exposure is required.
allow_tcp_port = 3000
