# CPanel Rocky - Apache reverse proxy template
# Save as: /etc/apache2/sites-available/cpanel.conf
#
# Required modules:
#   a2enmod proxy proxy_http proxy_wstunnel headers rewrite ssl
#   systemctl reload apache2

<VirtualHost *:80>
    ServerName panel.example.com

    # Optional: redirect to HTTPS
    # RewriteEngine On
    # RewriteCond %{HTTPS} !=on
    # RewriteRule ^/(.*)$ https://%{HTTP_HOST}/$1 [R=301,L]

    ProxyPreserveHost On
    ProxyRequests Off
    AllowEncodedSlashes NoDecode

    RequestHeader set X-Forwarded-Proto "http"
    RequestHeader set X-Forwarded-Port "80"

    # WebSocket endpoints used by panel
    ProxyPass        /ws/ ws://127.0.0.1:3000/ws/ retry=0 timeout=86400
    ProxyPassReverse /ws/ ws://127.0.0.1:3000/ws/

    # All HTTP traffic
    ProxyPass        / http://127.0.0.1:3000/ retry=0 timeout=3600
    ProxyPassReverse / http://127.0.0.1:3000/

    ErrorLog ${APACHE_LOG_DIR}/cpanel_error.log
    CustomLog ${APACHE_LOG_DIR}/cpanel_access.log combined
</VirtualHost>

