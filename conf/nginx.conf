# CPanel Rocky - Nginx reverse proxy template
# Use this file as a site config (e.g. /etc/nginx/sites-available/cpanel.conf)
# and adjust:
#   - server_name
#   - TLS certificate paths (if using HTTPS)
#   - upstream backend if panel runs on a different host/port

upstream cpanel_backend {
    server 127.0.0.1:3000;
    keepalive 64;
}

map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen 80;
    listen [::]:80;
    server_name panel.example.com;

    # Optional: force HTTPS
    # return 301 https://$host$request_uri;

    client_max_body_size 512m;

    location / {
        proxy_pass http://cpanel_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600;
    }

    # WebSocket routes used by panel:
    # /ws/connector
    # /ws/ui
    # /ws/server/:containerId
    location /ws/ {
        proxy_pass http://cpanel_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }
}

